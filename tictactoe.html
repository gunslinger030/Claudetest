<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: #e94560;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.6rem;
      color: #a8dadc;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.05);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #a8dadc; }

    .cell.win {
      background: #0f3460;
      animation: pulse 0.5s ease;
    }

    @keyframes pulse {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.12); }
      100% { transform: scale(1); }
    }

    #controls {
      margin-top: 1.8rem;
      display: flex;
      gap: 12px;
    }

    button {
      padding: 0.6rem 1.6rem;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    button:hover { opacity: 0.85; transform: scale(1.04); }

    #restart-btn { background: #e94560; color: #fff; }

    #mode-btn { background: #a8dadc; color: #1a1a2e; }

    #score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2rem;
      font-size: 1rem;
      color: #aaa;
    }

    #score span { text-align: center; }
    #score strong { display: block; font-size: 1.6rem; color: #eee; }
  </style>
</head>
<body>

<h1>Tic Tac Toe</h1>
<div id="status">Player X's turn</div>

<div id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div id="controls">
  <button id="restart-btn">Restart</button>
  <button id="mode-btn">vs CPU</button>
</div>

<div id="score">
  <span>X Wins<strong id="score-x">0</strong></span>
  <span>Draws<strong id="score-d">0</strong></span>
  <span>O Wins<strong id="score-o">0</strong></span>
</div>

<script>
  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const modeBtn = document.getElementById('mode-btn');
  const scoreX = document.getElementById('score-x');
  const scoreO = document.getElementById('score-o');
  const scoreD = document.getElementById('score-d');

  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, gameOver, vsCPU, scores;

  function init() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    cells.forEach(c => { c.textContent = ''; c.className = 'cell'; });
    status.textContent = `Player X's turn`;
  }

  function checkWinner(b) {
    for (const [a, bb, c] of WINS) {
      if (b[a] && b[a] === b[bb] && b[a] === b[c]) return { winner: b[a], line: [a, bb, c] };
    }
    if (b.every(v => v)) return { winner: 'draw' };
    return null;
  }

  function minimax(b, isMax) {
    const res = checkWinner(b);
    if (res) return res.winner === 'O' ? 10 : res.winner === 'X' ? -10 : 0;
    const scores = b.map((v, i) => {
      if (v) return null;
      b[i] = isMax ? 'O' : 'X';
      const s = minimax(b, !isMax);
      b[i] = '';
      return s;
    });
    return isMax ? Math.max(...scores.filter(s => s !== null)) : Math.min(...scores.filter(s => s !== null));
  }

  function cpuMove() {
    let best = -Infinity, move = -1;
    board.forEach((v, i) => {
      if (v) return;
      board[i] = 'O';
      const s = minimax(board, false);
      board[i] = '';
      if (s > best) { best = s; move = i; }
    });
    if (move !== -1) playMove(move);
  }

  function playMove(i) {
    if (board[i] || gameOver) return;
    board[i] = current;
    const cell = cells[i];
    cell.textContent = current;
    cell.classList.add(current.toLowerCase(), 'taken');

    const res = checkWinner(board);
    if (res) {
      gameOver = true;
      if (res.winner === 'draw') {
        status.textContent = "It's a draw!";
        scores.d++;
        scoreD.textContent = scores.d;
      } else {
        res.line.forEach(idx => cells[idx].classList.add('win'));
        const label = vsCPU && res.winner === 'O' ? 'CPU wins!' : `Player ${res.winner} wins!`;
        status.textContent = label;
        if (res.winner === 'X') { scores.x++; scoreX.textContent = scores.x; }
        else { scores.o++; scoreO.textContent = scores.o; }
      }
      return;
    }

    current = current === 'X' ? 'O' : 'X';
    const who = vsCPU && current === 'O' ? 'CPU' : `Player ${current}`;
    status.textContent = `${who}'s turn`;

    if (vsCPU && current === 'O') setTimeout(cpuMove, 350);
  }

  cells.forEach(c => c.addEventListener('click', () => {
    if (vsCPU && current === 'O') return;
    playMove(+c.dataset.i);
  }));

  document.getElementById('restart-btn').addEventListener('click', init);

  modeBtn.addEventListener('click', () => {
    vsCPU = !vsCPU;
    modeBtn.textContent = vsCPU ? '2 Players' : 'vs CPU';
    scores = { x: 0, o: 0, d: 0 };
    scoreX.textContent = scoreO.textContent = scoreD.textContent = 0;
    init();
  });

  vsCPU = false;
  scores = { x: 0, o: 0, d: 0 };
  init();
</script>
</body>
</html>
